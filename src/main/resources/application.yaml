server:
  port: ${ANALYTIC_SERVICE_PORT:8089}

spring:
  application:
    name: InnoAnalyticService

  datasource:
    url: jdbc:clickhouse://${CLICKHOUSE_HOST:localhost}:${CLICKHOUSE_PORT:8123}/${CLICKHOUSE_DATABASE:analytics}
    username: ${CLICKHOUSE_USERNAME:default}
    password: ${CLICKHOUSE_PASSWORD:}
    driver-class-name: com.clickhouse.jdbc.ClickHouseDriver

  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/changelog-master.xml

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8088/realms/innowise-realm}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      group-id: analytic-service
      auto-offset-reset: earliest
      properties:
        "[spring.json.trusted.packages]": "com.innowise.*"
        "[spring.json.use.type.headers]": false
    topic:
      analytics: analytics-events

clickhouse:
  nodes:
    - host: ${CLICKHOUSE_HOST:localhost}
      port: ${CLICKHOUSE_PORT:8123}
      database: ${CLICKHOUSE_DATABASE:analytics}
      username: ${CLICKHOUSE_USERNAME:default}
      password: ${CLICKHOUSE_PASSWORD:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true