name: CI InnoAnalyticService

on:
  push:
    branches:
      - main
      - tasks/**

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    services:
      clickhouse:
        image: clickhouse/clickhouse-server:latest
        ports:
          - 8123:8123
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:8123/ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      # Zookeeper must be defined BEFORE Kafka in the YAML for better startup ordering
      zookeeper:
        image: confluentinc/cp-zookeeper:7.4.0
        ports:
          - 2181:2181
        env:
          ZOOKEEPER_CLIENT_PORT: 2181
          ZOOKEEPER_TICK_TIME: 2000

      kafka:
        image: confluentinc/cp-kafka:7.4.0
        ports:
          - 9092:9092
        env:
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          # Internal listener for Kafka (29092) and External for your Tests (9092)
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
          KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_ZOOKEEPER_SESSION_TIMEOUT_MS: 30000
        options: >-
          --health-cmd "nc -z localhost 9092 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      CLICKHOUSE_HOST: localhost
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_DATABASE: analytics
      CLICKHOUSE_USERNAME: default
      CLICKHOUSE_PASSWORD: ""
      # IMPORTANT: Tests run on the host runner, so they use localhost
      KAFKA_BOOTSTRAP_SERVERS: localhost:9092
      SPRING_PROFILES_ACTIVE: ci
      LIQUIBASE_ENABLED: true
      SHOW_SQL: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install netcat
        run: sudo apt-get update && sudo apt-get install -y netcat-openbsd

      - name: Wait for ClickHouse
        run: |
          for i in {1..20}; do
            wget --no-verbose --tries=1 --spider http://localhost:8123/ping && echo "ClickHouse is up!" && break
            sleep 3
          done

      - name: Wait for Kafka
        run: |
          for i in {1..20}; do
            nc -z localhost 9092 && echo "Kafka is up!" && break
            echo "⏳ Waiting for Kafka..."
            sleep 3
          done

      - name: Build and run tests
        run: mvn clean verify -Dspring.profiles.active=ci

  code-analysis:
    name: Code Analysis (SonarQube)
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Run tests with coverage
        run: mvn clean verify -Dspring.profiles.active=ci

      - name: Run SonarQube analysis
        run: |
          mvn sonar:sonar \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.projectKey=kaimentalityy_inno-analytic-service \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/jacoco-report/jacoco.xml

  build-docker-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: code-analysis

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/analytic-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/analytic-service:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
